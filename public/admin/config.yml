# ─────────────────────────────────────────────────────────────────────────────
# DECAP CMS CONFIG — Retro Vinyl Portfolio
# Setiap 'collections' = satu halaman menu di admin panel
# Setiap 'fields' = satu input yang bisa diedit
# ─────────────────────────────────────────────────────────────────────────────

backend:
  name: github
  repo: eyocho/retro-vinyl-portfolio # ← ganti dengan username/repo Anda
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

# Tempat menyimpan gambar yang diupload via CMS
media_folder: public/images/uploads
public_folder: /images/uploads

# Aktifkan preview lokal (opsional)
local_backend: false

collections:
  # ── 1. PROFIL UTAMA ────────────────────────────────────────────────────────
  - name: "profile"
    label: "👤 Profil Utama"
    files:
      - name: "profile"
        label: "Data Profil"
        file: "src/data/profile.json"
        fields:
          - {
              label: "Nama Lengkap",
              name: "name",
              widget: "string",
              hint: "Ditampilkan sebagai 'Main Artist' di Hero section",
            }
          - {
              label: "Role / Pekerjaan",
              name: "role",
              widget: "string",
              hint: "Contoh: Full Stack Developer & UI Designer",
            }
          - {
              label: "Lokasi",
              name: "location",
              widget: "string",
              default: "Jakarta, Indonesia",
            }
          - { label: "Email Kontak", name: "email", widget: "string" }
          - {
              label: "Foto Profil",
              name: "photo",
              widget: "image",
              required: false,
            }
          - label: "Biografi"
            name: "bio"
            widget: "list"
            hint: "Setiap item = satu paragraf biografi"
            field: { label: "Paragraf", name: "paragraph", widget: "text" }
          - label: "Statistik (Spotify Wrapped)"
            name: "stats"
            widget: "list"
            fields:
              - {
                  label: "Label",
                  name: "label",
                  widget: "string",
                  hint: "Contoh: Years of Experience",
                }
              - {
                  label: "Nilai",
                  name: "value",
                  widget: "string",
                  hint: "Contoh: 4+",
                }
              - {
                  label: "Satuan",
                  name: "unit",
                  widget: "string",
                  hint: "Contoh: tahun",
                }

  # ── 2. SKILLS / MIXER BOARD ────────────────────────────────────────────────
  - name: "skills"
    label: "🎚️ Skills (Mixer Board)"
    files:
      - name: "skills"
        label: "Data Skills"
        file: "src/data/skills.json"
        fields:
          - label: "Channel Skills"
            name: "channels"
            widget: "list"
            fields:
              - {
                  label: "Kategori",
                  name: "category",
                  widget: "string",
                  hint: "Contoh: Frontend",
                }
              - {
                  label: "Warna",
                  name: "color",
                  widget: "color",
                  default: "#dcae1d",
                }
              - label: "Skills"
                name: "skills"
                widget: "list"
                fields:
                  - { label: "Nama Skill", name: "name", widget: "string" }
                  - {
                      label: "Level (0-100)",
                      name: "level",
                      widget: "number",
                      value_type: "int",
                      min: 0,
                      max: 100,
                    }

  # ── 3. PROYEK / DISCOGRAPHY ────────────────────────────────────────────────
  - name: "projects"
    label: "💿 Proyek (Discography)"
    files:
      - name: "projects"
        label: "Daftar Proyek"
        file: "src/data/projects.json"
        fields:
          - label: "Proyek"
            name: "projects"
            widget: "list"
            fields:
              - {
                  label: "Nomor Track",
                  name: "trackNumber",
                  widget: "string",
                  hint: "Contoh: 01",
                }
              - { label: "Nama Proyek", name: "title", widget: "string" }
              - { label: "Tahun", name: "year", widget: "string" }
              - {
                  label: "Durasi (dekoratif)",
                  name: "duration",
                  widget: "string",
                  hint: "Contoh: 3:42",
                }
              - {
                  label: "Role Anda",
                  name: "role",
                  widget: "string",
                  hint: "Contoh: Full Stack Developer",
                }
              - { label: "Deskripsi", name: "description", widget: "text" }
              - label: "Teknologi (Genre)"
                name: "genre"
                widget: "list"
                field: { label: "Teknologi", name: "tech", widget: "string" }
              - {
                  label: "Link Live Demo",
                  name: "liveUrl",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "Link GitHub",
                  name: "githubUrl",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "Featured?",
                  name: "highlight",
                  widget: "boolean",
                  default: false,
                }

  # ── 4. PLAYLIST / TRACKLIST MUSIK ─────────────────────────────────────────
  - name: "tracks"
    label: "🎵 Playlist Musik"
    files:
      - name: "tracks"
        label: "Daftar Lagu"
        file: "src/data/tracks.json"
        fields:
          - label: "Tracks"
            name: "tracks"
            widget: "list"
            fields:
              - { label: "Judul Lagu", name: "title", widget: "string" }
              - { label: "Artis", name: "artist", widget: "string" }
              - {
                  label: "File Audio (path)",
                  name: "src",
                  widget: "string",
                  hint: "Contoh: /audio/track-01.mp3",
                }
