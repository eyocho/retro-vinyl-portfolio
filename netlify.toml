# ─────────────────────────────────────────────────────────────────────────────
# NETLIFY CONFIG — Retro Vinyl Portfolio
# ─────────────────────────────────────────────────────────────────────────────

[build]
  command   = "npm run build"
  publish   = "dist"

# SPA: semua route (termasuk /admin) → index.html React
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Tapi /admin tetap bisa diakses (static HTML, bukan React route)
[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 200
  force  = true

[[redirects]]
  from   = "/admin/*"
  to     = "/admin/index.html"
  status = 200
  force  = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache assets lama (JS/CSS punya hash di filename)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
